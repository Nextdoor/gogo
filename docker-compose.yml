services:
  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: gogo
      POSTGRES_PASSWORD: gogo
      POSTGRES_DB: gogo
      PGDATA: /var/lib/postgresql/data/gogo
    volumes:
      - pgdata:/var/lib/postgresql/data/gogo
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gogo", "-d", "gogo"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "80:80"
      - "443:443"
      - "5000:5000"
    environment:
      CONFIG: DevelopmentConfig
      SKIP_AUTH: "true"
      DATABASE_URI: postgresql://gogo:gogo@db/gogo
      HTTPS_REDIRECT_URL: http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
